<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QVox · panel</title>
  <link rel="stylesheet" href="/styles.css" />
  <!-- Phosphor Icons (project icon set — no emojis, see AGENTS.md) -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body>
  <header>
    <div class="brand">
      <img src="/logo.png" class="logo" alt="QVox" />
      <span class="tag">control panel</span>
    </div>
    <div class="status-right">
      <span class="dot" id="dot"></span>
      <span id="status-mini">engine…</span>
    </div>
  </header>

  <main>
    <!-- main column: voice testing + API examples -->
    <div class="main-col">
      <section class="card" id="test-card">
        <h2>Test voice</h2>
        <textarea id="text" rows="3" placeholder="Type text. Insert [emotion] tags to change feeling mid-audio…">[laughing] Ha, ha, ha, this is amazing! [sad] But sometimes things just don't work out. [excited] And then, it all came together!</textarea>
        <div class="chips-label">Insert emotion tag (applies until the next tag):</div>
        <div class="chips" id="chips">
          <button type="button" class="chip" data-tag="laughing"><i class="ph ph-smiley-wink"></i> laughing</button>
          <button type="button" class="chip" data-tag="happy"><i class="ph ph-smiley"></i> happy</button>
          <button type="button" class="chip" data-tag="sad"><i class="ph ph-smiley-sad"></i> sad</button>
          <button type="button" class="chip" data-tag="crying"><i class="ph ph-drop"></i> crying</button>
          <button type="button" class="chip" data-tag="excited"><i class="ph ph-lightning"></i> excited</button>
          <button type="button" class="chip" data-tag="angry"><i class="ph ph-flame"></i> angry</button>
          <button type="button" class="chip" data-tag="whisper"><i class="ph ph-wind"></i> whisper</button>
          <button type="button" class="chip" data-tag="calm"><i class="ph ph-leaf"></i> calm</button>
          <button type="button" class="chip" data-tag="narrator"><i class="ph ph-microphone"></i> narrator</button>
        </div>
        <div class="row">
          <label class="grow">Language
            <select id="lang">
              <option>Spanish</option><option>English</option><option>Chinese</option>
              <option>Japanese</option><option>Korean</option><option>German</option>
              <option>French</option><option>Russian</option><option>Portuguese</option>
              <option>Italian</option>
            </select>
          </label>
          <label>Temp <input id="temp" type="number" step="0.1" value="0.7" /></label>
        </div>
        <div class="row">
          <label class="grow">Base voice (system prompt — kept across the whole audio, English works best)
            <input id="instruct" value="A warm Argentine man, Buenos Aires accent" /></label>
        </div>
        <p class="muted">Emotion is set per segment with the [tags] above. The base voice + a fixed seed keep the same voice.</p>
        <div class="row">
          <label class="grow">Clone (path to a reference wav, optional)
            <input id="clone" placeholder="/path/to/reference_voice.wav" /></label>
        </div>
        <button id="speak"><i class="ph ph-waveform"></i> Generate</button>
        <a id="download" class="ghost small" download="qvox-audio.wav" style="display:none"><i class="ph ph-download-simple"></i> Download</a>
        <span id="speak-status" class="muted"></span>
        <audio id="player" controls></audio>
      </section>

      <section class="card" id="examples-card">
        <h2>API examples</h2>
        <div class="tabs" id="ex-tabs">
          <button class="tab active" data-ex="curl">curl</button>
          <button class="tab" data-ex="js">JavaScript</button>
          <button class="tab" data-ex="python">Python</button>
          <button class="tab" data-ex="php">PHP</button>
        </div>
        <div class="code-wrap">
          <button class="copy-btn" id="ex-copy" title="copy"><i class="ph ph-copy"></i></button>
          <pre id="ex-code">—</pre>
        </div>
      </section>
    </div>

    <!-- sidebar -->
    <aside class="side">
      <section class="card" id="status-card">
        <h2>Status</h2>
        <div id="status" class="kv">loading…</div>
        <label class="field">Engine
          <select id="engine">
            <option value="auto">auto</option>
            <option value="mlx">mlx (fast · Apple Silicon · no clone)</option>
            <option value="torch">torch (universal · clone · slower)</option>
          </select>
        </label>
        <button id="restart" class="ghost small"><i class="ph ph-arrow-clockwise"></i> apply / restart</button>
      </section>

      <section class="card" id="models-card">
        <h2>Models</h2>
        <div id="models" class="kv">—</div>
      </section>

      <section class="card" id="apikey-card">
        <h2>API protection</h2>
        <div id="prot-status" class="kv">—</div>
        <div class="key-row">
          <input id="keyview" readonly placeholder="no key (open)" />
          <button class="ghost small" id="key-copy" title="copy"><i class="ph ph-copy"></i></button>
        </div>
        <div class="key-actions">
          <button id="key-gen"><i class="ph ph-key"></i> Generate</button>
          <button class="ghost small" id="key-del"><i class="ph ph-trash"></i> Delete</button>
        </div>
      </section>
    </aside>
  </main>

  <footer>QVox · localhost — <span id="foot"></span></footer>
  <script src="/app.js"></script>
</body>
</html>
