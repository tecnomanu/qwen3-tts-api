<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>qvox · panel</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div class="brand"><span class="dot" id="dot"></span><h1 id="title">qvox</h1>
      <span class="tag" id="tag">panel de control</span></div>
    <div class="keybox">
      <input id="apikey" type="password" placeholder="API key (si está protegido)" />
      <button id="savekey" class="ghost">guardar</button>
    </div>
  </header>

  <main>
    <section class="card" id="status-card">
      <h2>Estado</h2>
      <div id="status" class="kv">cargando…</div>
      <button id="restart" class="ghost small">reiniciar motor</button>
    </section>

    <section class="card" id="test-card">
      <h2>Probar voz</h2>
      <textarea id="text" rows="3" placeholder="Escribí algo para escuchar…">Hola, ¿cómo andás? Probando el motor de voz.</textarea>
      <div class="row">
        <label>Idioma <input id="lang" value="Spanish" /></label>
        <label>Temp <input id="temp" type="number" step="0.1" value="0.7" /></label>
      </div>
      <div class="row">
        <label class="grow">Instruct (descripción de voz, inglés)
          <input id="instruct" placeholder="A warm Argentine man, Buenos Aires accent" /></label>
      </div>
      <div class="row">
        <label class="grow">Clone (ruta a wav de referencia, opcional)
          <input id="clone" placeholder="/ruta/voz_referencia.wav" /></label>
      </div>
      <button id="speak">🔊 Generar</button>
      <span id="speak-status" class="muted"></span>
      <audio id="player" controls></audio>
    </section>

    <section class="card" id="models-card">
      <h2>Modelos</h2>
      <div id="models" class="kv">—</div>
    </section>

    <section class="card" id="config-card">
      <h2>Configuración</h2>
      <pre id="config">—</pre>
      <p class="muted">Editá con la terminal: <code>qvox config set &lt;path&gt; &lt;valor&gt;</code></p>
    </section>
  </main>

  <footer>qvox · localhost — <span id="foot"></span></footer>
  <script src="/app.js"></script>
</body>
</html>
