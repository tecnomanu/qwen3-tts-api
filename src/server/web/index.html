<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QVox · panel</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div class="brand"><span class="dot" id="dot"></span>
      <img src="/logo.png" class="logo" alt="QVox" />
      <span class="tag" id="tag">control panel</span></div>
    <div class="keybox">
      <input id="apikey" type="password" placeholder="API key (if protected)" />
      <button id="savekey" class="ghost">save</button>
    </div>
  </header>

  <main>
    <!-- main column: voice testing -->
    <section class="card main-col" id="test-card">
      <h2>Test voice</h2>
      <textarea id="text" rows="3" placeholder="Type something to hear…">Hi there, this is a quick voice engine test.</textarea>
      <div class="row">
        <label class="grow">Language
          <select id="lang">
            <option>Spanish</option>
            <option>English</option>
            <option>Chinese</option>
            <option>Japanese</option>
            <option>Korean</option>
            <option>German</option>
            <option>French</option>
            <option>Russian</option>
            <option>Portuguese</option>
            <option>Italian</option>
          </select>
        </label>
        <label>Temp <input id="temp" type="number" step="0.1" value="0.7" /></label>
      </div>
      <div class="row">
        <label class="grow">Instruct (voice description — controls emotion/laughs, English works best)
          <input id="instruct" placeholder="A warm Argentine man, Buenos Aires accent" /></label>
      </div>
      <div class="chips" id="chips">
        <button type="button" class="chip" data-i="A cheerful, upbeat voice">😄 Cheerful</button>
        <button type="button" class="chip" data-i="Speaking happily with genuine laughter">😂 Laughing</button>
        <button type="button" class="chip" data-i="Whispering softly">🤫 Whisper</button>
        <button type="button" class="chip" data-i="An excited, energetic voice">⚡ Excited</button>
        <button type="button" class="chip" data-i="A calm, relaxed voice">😌 Calm</button>
        <button type="button" class="chip" data-i="A sad, melancholic voice">😢 Sad</button>
        <button type="button" class="chip" data-i="Speaking in an angry tone">😠 Angry</button>
        <button type="button" class="chip" data-i="A warm, professional narrator voice">🎙️ Narrator</button>
        <button type="button" class="chip" data-i="A warm Argentine man, Buenos Aires accent">🇦🇷 Argentine</button>
      </div>
      <p class="muted">No inline tags yet — emotion is set via the description. Tip: for laughs, also write "Ha, ha, ha" in the text.</p>
      <div class="row">
        <label class="grow">Clone (path to a reference wav, optional)
          <input id="clone" placeholder="/path/to/reference_voice.wav" /></label>
      </div>
      <button id="speak">🔊 Generate</button>
      <span id="speak-status" class="muted"></span>
      <audio id="player" controls></audio>
    </section>

    <!-- sidebar: status, models, config -->
    <aside class="side">
      <section class="card" id="status-card">
        <h2>Status</h2>
        <div id="status" class="kv">loading…</div>
        <button id="restart" class="ghost small">restart engine</button>
      </section>

      <section class="card" id="models-card">
        <h2>Models</h2>
        <div id="models" class="kv">—</div>
      </section>

      <section class="card" id="config-card">
        <h2>Configuration</h2>
        <pre id="config">—</pre>
        <p class="muted">Edit from the terminal: <code>qvox config set &lt;path&gt; &lt;value&gt;</code></p>
      </section>
    </aside>
  </main>

  <footer>QVox · localhost — <span id="foot"></span></footer>
  <script src="/app.js"></script>
</body>
</html>
